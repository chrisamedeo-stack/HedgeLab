spring:
  application:
    name: hedgelab-api
  profiles:
    active: dev

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.hedgelab: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

hedgelab:
  risk:
    credit-amber-threshold: 80
    credit-red-threshold: 95
    var-lookback-days: 252
    black76-risk-free-rate: 0.05
    vol-lookback-days: 60
  trade:
    reference-prefix: HL
  pricing:
    default-scale: 6
  security:
    jwt-secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    jwt-expiration-ms: 86400000
  market-data:
    api-key: ${COMMODITY_API_KEY:}
    base-url: https://api.commoditypriceapi.com/v2
    symbol-map:
      ICE-BRENT-1M: BRENTOIL-FUT
      NYMEX-WTI-1M: WTIOIL-FUT
      HH-NG-1M: NG-FUT
      LME-CU-CASH: HG-FUT
      CBOT-CORN-1M: CORN
  scheduling:
    eod-cron: "0 0 17 * * MON-FRI"
    credit-recalc-cron: "0 30 17 * * MON-FRI"
    pnl-snapshot-cron: "0 0 18 * * MON-FRI"
    price-feed-cron: "0 30 16 * * MON-FRI"
    timezone: "America/New_York"
