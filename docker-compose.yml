version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hedgelab-postgres
    environment:
      POSTGRES_DB: hedgelab
      POSTGRES_USER: hedgelab
      POSTGRES_PASSWORD: hedgelab
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedgelab -d hedgelab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: hedgelab-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hedgelab
      DB_USER: hedgelab
      DB_PASSWORD: hedgelab
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hedgelab-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api-server

volumes:
  pg_data:
